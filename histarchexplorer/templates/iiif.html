<div id="iiif-viewer" class="iiif-viewer-container" style="height: 500px; width: 100%;">
  <script src="/static/node_modules/mirador/dist/mirador.min.js"></script>
  <script>
      const config = {
          "id": "iiif-viewer",
          "layout": "1x1",
          "mainMenuSettings": {
              "show": false
          },
          "workspaceControlPanel": {% macro overview_image(image) %}
  <div class="item-half">
    <div class="item-content item-content-full">
      <div class="muuri-images">
        <div class="image position-relative">

          {# 3D-Modell-Ansicht (GLB/GLTF) #}
          {% if image.render_type == '3d_model' %}
            <div class="model-wrapper" style="height: 300px; position: relative;">
              <div class="spinner"></div>
              <model-viewer
                  src="{{ image.url }}" alt="{{ image.title }}"
                  camera-controls style="width: 100%; height: 100%;"
                  ar ar-modes="webxr scene-viewer quick-look"
                  shadow-intensity="1" autoplay></model-viewer>
            </div>

            {# IIIF-Bild, wenn kein WebP #}
          {% elif image.iiif_base_path and image.mimetype|lower != 'image/webp' %}
            <a href="{{ image.iiif_base_path }}/full/max/0/default.jpg"
               target="_blank"
               class="hover-max position-absolute bottom-0 end-0 m-2 text-dark bg-white bg-opacity-75 px-2 py-1 rounded"
               style="z-index: 10;">
              <i class="bi bi-arrows-fullscreen"></i>
            </a>
            <img
                src="{{ image.iiif_base_path }}/full/400,/0/default.jpg"
                alt="{{ image.title }}">
          {% else %}
            <img
                src="{{ image.url }}"
                alt="{{ image.title }}">
          {% endif %}

        </div>
      </div>
    </div>
  </div>
{% endmacro %}{
              "enabled": false
          },
          "window": {
              "allowClose": false,
              "defaultSideBarPanel": 'attribution',
              "sideBarOpenByDefault": false,
              "forceDrawAnnotations": true,
              "highlightAllAnnotations": true,

          },
          "workspace": {
              "type": "{{ "mosaic" if entity.depictions|length < 9 else 'elastic' }}"
          },
          "language": "{{ session.language }}",
          "availableLanguages": {
              "de": "Deutsch",
              "en": "English",
              "fr": "Français"
          },
          "windows": [
                {
                    "loadedManifest": "{{ depiction.iiif_manifest }}"}

          ]
      };
      Mirador.viewer(config);
  </script>
</div>
