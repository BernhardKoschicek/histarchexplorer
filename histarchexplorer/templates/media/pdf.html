{% import '_macros.html' as ui %}
{% extends "layout.html" %}
{% block content %}
  <div class="page-wrapper">
    <div class="scrollable-container">
      <div class="container-fluid py-4 text-center">

        {% if back_url %}
          {{ ui.back_button(back_url) }}
        {% endif %}

        <div class="d-flex justify-content-center">
          <div class="pdf-viewer-wrapper position-relative w-100"
               style="height: 90vh;">

            <!-- PDF Viewer -->
            <iframe id="mainPdf"
                    src="{{ file_url }}"
                    class="w-100 h-100 rounded shadow border-0"
                    style="background-color: #fff;"></iframe>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const iframe = document.getElementById("mainPdf");
      const spinner = document.querySelector(".spinner");

      iframe.addEventListener("load", () => spinner?.remove());
      setTimeout(() => spinner?.remove(), 5000);
    });
  </script>

  <style>
      .pdf-viewer-wrapper {
          border-radius: 1rem;
          overflow: hidden;
          box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
          background-color: #fff;
      }
  </style>

{% endblock %}
