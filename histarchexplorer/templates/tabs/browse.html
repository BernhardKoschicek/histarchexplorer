<div id="table-{{ tab_name }}" class="tabulator-container"></div>

<script>
    const filteredEntities{{ tab_name }} = getEntitiesForTab('{{ tab_name }}');
    console.log('tab_name');
    console.log('{{ tab_name }}');
    console.log(filteredEntities{{ tab_name }});

    const columns{{ tab_name }} = [
        {
            title: "Name",
            field: "name",
            headerSort:false,
            minWidth: 450,
            formatter: function (cell) {
                const data = cell.getRow().getData();
                const id = data.id;
                const name = data.name;
                const begin = data.begin;
                const end = data.end;
                const description = translateDescription(data.description);

                let dateString = '';
                if (begin) {
                    dateString += makeLocalDate(begin).localdate;
                }
                if (begin && end && begin !== end) {
                    dateString += " - ";
                }
                if (end && end !== begin) {
                    dateString += makeLocalDate(end).localdate;
                }

                let hoverTitle = `${name || ''} ${dateString ? '(' + dateString + ')' : ''}`.trim();

                if (description) {
                    hoverTitle += `\n\n${description}`;
                }

                return `<div title="${hoverTitle}">` +
                    `<span>${name}</span><br>` +
                    `<span class="name-column-date-subtitle">${dateString}</span>` +
                    `</div>`;
            }
        },
        {
            title: "Category",
            field: "class", // Still needs a field if you ever want to filter by it
            headerSort:false,
            maxWidth: 450,
            minWidth: 450,
            formatter: function (cell) {
                const data = cell.getRow().getData();
                let classValue = data.class;
                let typeValue = data.type;

                let leftContent = '';
                let rawClass = '';
                if (classValue) {
                    rawClass = classValue;
                    leftContent = classValue.charAt(0).toUpperCase() + classValue.slice(1);
                }

                let rightContent = '';
                let rawType = '';
                if (typeValue) {
                    rawType = typeValue;
                    rightContent = typeValue;
                }

                let combinedHtml = '';

                if (leftContent) {
                    combinedHtml += `<span>${leftContent}</span>`;
                }
                if (rightContent) {
                    combinedHtml += `<br><i class="category-column-type-subtitle">${rightContent}</i>`;
                }

                if (leftContent || rightContent) {
                    combinedHtml += `<div class="tabulator-cell-clearfix"></div>`;
                }

                let hoverTitle = '';
                if (rawClass && rawType) {
                    hoverTitle = `${leftContent} / ${rawType}`;
                } else if (rawClass) {
                    hoverTitle = rawClass;
                } else if (rawType) {
                    hoverTitle = rawType;
                }


                return `<div title="${hoverTitle}">` +
                    combinedHtml +
                    `</div>`;
            }
        }
    ];


    const table{{ tab_name }} = new Tabulator("#table-{{ tab_name }}", {
        layout: "fitColumns",
        responsiveLayout: "collapse",
        height: "calc( 100vh - 100px - 4rem)", // Adjusted height from previous step
        data: filteredEntities{{ tab_name }},
        pagination: "local",
        paginationSize: 50,
        paginationSizeSelector: [20, 50, 100],
        columns: columns{{ tab_name }},
    });
</script>
