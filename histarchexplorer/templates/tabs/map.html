<style>
/* === Layout Containers === */
.layer-control-ctrl {
  position: relative;
}

.layer-panel {
  position: absolute;
  left: 0;
  top: 0;
  background: white;
  padding: 8px;
  padding-top: 25px;
  border-radius: 6px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  width: 340px;
  max-height: 80vh;
  overflow-y: auto;
  font-size: 13px;
  z-index: 2;
}

.layer-panel.hidden,
.hidden {
  display: none;
}

/* === Buttons === */
.layer-toggle-btn {
  background: white;
  border: none;
  border-radius: 4px;

.layer-close-btn {

  font-size: 16px;
  cursor: pointer;
}

.layer-close-btn:hover {
  color: #000;
}

.edit-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  margin-left: 8px;
  padding: 0 4px;
  transition: color 0.2s ease;
}

.edit-btn:hover {
  color: #000;
}

/* === Layer Groups === */
.layer-group {
  border: 1px solid #ddd;
  background: whitesmoke !important;
  margin: 5px;
}

/* === Headers and Structure === */
.group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 0;

}

.group-header input[type="checkbox"] {

}

.count {

.edit-menu {

.geom-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  font-style: italic;
  color: #333;
  margin: 3px 0;
  cursor: pointer;
}

.geom-header input[type="color"] {
  margin-left: auto;
  cursor: pointer;
  border: none;
  background: none;
  width: 24px;
  height: 24px;
  padding: 0;
}

.layer-panel .geom-toggle {
  display: flex;

  gap: 4px;
}

.symbol {

  height: 20px;

.layer-sub,

.layer-item {
  font-size: 0.9em;
}

.layer-item strong {
  color: #b30000;
}

.layer-item strong::before {
