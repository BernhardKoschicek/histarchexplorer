{% extends "layout.html" %}
{% block content %}

<section class="container entity-cards">
{% for view_class in view_classes %}
<div id="{{ view_class | lower }}-card" class="entity-card entity-card--{{ view_class | lower }}">
    <div class="entity-card__icon">
        <img src="/static/images/entity_icons/{{ view_class | lower }}_550.png" alt="{{ class_name }}">
    </div>
    <div class="entity-card__label">{{ view_class }}</div>
    <div class="entity-card__description">Lorem ipsum dolor sit amet consectetur. Risus malesuada feugiat sit integer non.
        Nisl blandit at scelerisque id arcu nisi nisl lacus.
    </div>
    <div class="entity-card__count">798 entities</div>
</div>
{% endfor %}

</section>
{% endblock %}
