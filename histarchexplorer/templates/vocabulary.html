{% extends "layout.html" %}

{% block content %}
  <div style="padding-top: 100px;"></div>

  <style>
      body, html {
          height: 100%;
          overflow-y: auto;
      }

      .tab-buttons {
          margin-bottom: 10px;
      }

      .tab-buttons button {
          padding: 8px 16px;
          margin-right: 4px;
          border: 1px solid #ccc;
          background: #f0f0f0;
          cursor: pointer;
          border-radius: 4px;
          font-weight: bold;
      }

      .tab-buttons button.active {
          background: #007bff;
          color: white;
          border-color: #007bff;
      }

      .tree-container {
          max-height: 70vh;
          overflow-y: auto;
          border: 1px solid #ccc;
          padding: 10px;
          display: none;
      }

      .tree-container.active {
          display: block;
      }
  </style>

  <div class="tab-buttons">
    <button id="tab-main" class="active" onclick="showTab('main')">Main Classes</button>
    <button id="tab-custom" onclick="showTab('custom')">Types</button>
    <button id="tab-value" onclick="showTab('value')">Value Types</button>
  </div>

  <div id="tree-main" class="tree-container active"></div>
  <div id="tree-custom" class="tree-container"></div>
  <div id="tree-value" class="tree-container"></div>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/quercus.css') }}">
  <script src="{{ url_for('static', filename='js/quercus.js') }}"></script>
<script>
    const typeFilters = {{ type_filters | tojson }};
</script>

  <script>
      function buildTree(flatData) {
          const nodesById = {};
          Object.values(flatData).forEach(node => {
              nodesById[node.id] = {
                  id: node.id,
                  name: node.name,
                  children: []
              };
          });

          Object.values(flatData).forEach(node => {
              if (node.subs?.length) {
                  node.subs.forEach(childId => {
                      if (nodesById[childId]) {
                          nodesById[node.id].children.push(nodesById[childId]);
                      }
                  });
              }
          });

          const hasParent = new Set();
          Object.values(flatData).forEach(node => {
              if (node.subs?.length) {
                  node.subs.forEach(childId => hasParent.add(childId));
              }
          });

          return Object.values(nodesById)
              .filter(node => !hasParent.has(node.id))
              .sort((a, b) => a.name.localeCompare(b.name));
      }

      function collectWithChildren(data, allowedIds) {
    const result = {};
    const visited = new Set();

    function collect(id) {
        if (visited.has(id) || !data[id]) return;
        visited.add(id);
        result[id] = data[id];
        if (data[id].subs) {
            data[id].subs.forEach(childId => collect(childId));
        }
    }

    allowedIds.forEach(id => collect(id));
    return result;
}

function filterByCategoryAndIds(data, category, allowedIds) {
    const relevant = collectWithChildren(data, allowedIds);
    const filtered = {};
    for (const key in relevant) {
        const item = relevant[key];
        if (item.category === category) {
            filtered[key] = item;
        }
    }
    return filtered;
}


      function showTab(tab) {
          document.querySelectorAll('.tree-container').forEach(div => div.classList.remove('active'));
          document.getElementById('tree-' + tab).classList.add('active');

          document.querySelectorAll('.tab-buttons button').forEach(btn => btn.classList.remove('active'));
          document.getElementById('tab-' + tab).classList.add('active');
      }

      document.addEventListener("DOMContentLoaded", () => {
          fetch("https://thanados.openatlas.eu/api/0.4/type_tree/")
              .then(res => res.json())
              .then(data => {
                  const typeTree = data.typeTree;



                  const mainTypes = buildTree(filterByCategoryAndIds(data.typeTree, 'standard', typeFilters.standard || []));

                  const customTypes = buildTree(filterByCategoryAndIds(typeTree, 'custom', Object.keys(typeTree).map(Number)));
                  const valueTypes = buildTree(filterByCategoryAndIds(typeTree, 'value', Object.keys(typeTree).map(Number)));

                  new Treeview({containerId: "tree-main", data: mainTypes});
                  new Treeview({containerId: "tree-custom", data: customTypes});
                  new Treeview({containerId: "tree-value", data: valueTypes});
              })
              .catch(err => {
                  console.error("Failed to fetch or build tree data:", err);
              });
      });
  </script>
{% endblock %}
